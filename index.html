<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vodíkový slovník</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --navy: #0a1628;
    --blue: #0057b8;
    --blue-light: #e6f0fc;
    --accent: #00c2e0;
    --text: #1a1f2e;
    --muted: #6b7280;
    --border: #e2e6ed;
    --tag-bg: #eef4ff;
    --tag-text: #2563eb;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--navy);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 64px;
    border-bottom: 2px solid var(--accent);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    color: #fff;
    white-space: nowrap;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .logo span {
    color: var(--accent);
  }

  .h2-symbol {
    font-size: 1.4rem;
    font-weight: 700;
  }

  .search-wrap {
    flex: 1;
    max-width: 560px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 0.55rem 1rem 0.55rem 2.6rem;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .search-wrap input::placeholder { color: rgba(255,255,255,0.45); }
  .search-wrap input:focus {
    border-color: var(--accent);
    background: rgba(255,255,255,0.12);
  }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.4);
    pointer-events: none;
  }

  .header-stats {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.45);
    white-space: nowrap;
    margin-left: auto;
  }

  .count-highlight { color: var(--accent); }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* SIDEBAR */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    overflow-y: auto;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
  }

  .sidebar-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 1.25rem 0.75rem;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0.5rem 1.25rem;
    border: none;
    background: none;
    cursor: pointer;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    color: var(--text);
    transition: background 0.15s, color 0.15s;
    gap: 0.5rem;
  }

  .cat-btn:hover { background: var(--bg); }

  .cat-btn.active {
    background: var(--blue-light);
    color: var(--blue);
    font-weight: 600;
  }

  .cat-btn .cat-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    background: var(--bg);
    color: var(--muted);
    padding: 0.1rem 0.4rem;
    border-radius: 100px;
    min-width: 24px;
    text-align: center;
    flex-shrink: 0;
  }

  .cat-btn.active .cat-count {
    background: var(--blue);
    color: #fff;
  }

  .divider { height: 1px; background: var(--border); margin: 0.75rem 1.25rem; }

  /* MAIN */
  main {
    padding: 1.75rem 2rem;
    overflow-y: auto;
  }

  /* ALPHABET NAV */
  .alpha-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 1.5rem;
  }

  .alpha-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 0.25rem 0.45rem;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 5px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .alpha-btn:hover { border-color: var(--blue); color: var(--blue); }
  .alpha-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .alpha-btn.disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  /* RESULTS BAR */
  .results-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    min-height: 28px;
  }

  .results-count {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .results-count strong { color: var(--text); }

  .sort-select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }

  /* CARDS */
  .cards-grid {
    display: grid;
    gap: 0.875rem;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.1rem 1.25rem;
    cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
  }

  .card:hover {
    box-shadow: var(--shadow);
    border-color: #c5d6f0;
    transform: translateY(-1px);
  }

  .card.expanded {
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(0,87,184,0.1);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }

  .card-title-area { flex: 1; }

  .card-pojem {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 0.2rem;
  }

  .card-pojem mark {
    background: #fff3b0;
    border-radius: 2px;
    padding: 0 1px;
    color: inherit;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.4rem;
  }

  .tag {
    font-size: 0.72rem;
    padding: 0.15rem 0.5rem;
    border-radius: 100px;
    font-weight: 500;
    white-space: nowrap;
  }

  .tag-cat { background: var(--tag-bg); color: var(--tag-text); }
  .tag-sub { background: #f0fdf4; color: #16a34a; }
  .tag-zkratka {
    font-family: 'Space Mono', monospace;
    background: #fef3c7;
    color: #b45309;
    font-size: 0.7rem;
  }
  .tag-en { background: #faf5ff; color: #7c3aed; }

  .card-chevron {
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 2px;
    transition: transform 0.2s;
  }

  .card.expanded .card-chevron { transform: rotate(180deg); }

  .card-body {
    display: none;
    margin-top: 0.9rem;
    padding-top: 0.9rem;
    border-top: 1px solid var(--border);
    animation: fadeIn 0.2s ease;
  }

  .card.expanded .card-body { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-popis {
    font-size: 0.9rem;
    line-height: 1.7;
    color: #374151;
  }

  .card-popis mark {
    background: #fff3b0;
    border-radius: 2px;
    padding: 0 1px;
    color: inherit;
  }

  .card-footer-info {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.75rem;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .card-footer-info span { display: flex; align-items: center; gap: 0.3rem; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }

  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }
  .empty p { font-size: 0.875rem; }

  /* CLEAR BTN */
  .clear-btn {
    position: absolute;
    right: 0.6rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.5);
    padding: 0.2rem;
    display: none;
    font-size: 1rem;
    line-height: 1;
  }

  .clear-btn:hover { color: #fff; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    header { gap: 1rem; }
    .logo { font-size: 0.8rem; }
    .header-stats { display: none; }
    main { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="h2-symbol">H₂</span>
    <span>Slovník</span>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="text" placeholder="Hledat pojem, zkratku, popis…" autocomplete="off">
    <button class="clear-btn" id="clearBtn">✕</button>
  </div>
  <div class="header-stats">
    <span class="count-highlight" id="statCount">203</span> pojmů
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-title">Kategorie</div>
    <button class="cat-btn active" data-cat="">
      Vše
      <span class="cat-count" id="countAll">203</span>
    </button>
    <div class="divider"></div>
    <div id="catList"></div>
  </aside>

  <main>
    <nav class="alpha-nav" id="alphaNav"></nav>
    <div class="results-bar">
      <div class="results-count" id="resultsCount"></div>
      <select class="sort-select" id="sortSelect">
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="newest">Nejnovější</option>
      </select>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </main>
</div>

<script>
const DATA = [{"pojem":"Adaptivn\u00ed regulace","doslovny":"","zkratka":"","popis":"Automatick\u00e9 p\u0159izp\u016fsoben\u00ed provozn\u00edch parametr\u016f (nap\u0159. tlaku, pr\u016ftoku) na z\u00e1klad\u011b aktu\u00e1ln\u00edch podm\u00ednek.","kategorie":"V\u00fdroba","subkategorie":"Elektrol\u00fdza","datum":"2025-03-10"},{"pojem":"Adicionalita","doslovny":"","zkratka":"","popis":"Jedn\u00e1 se o princip zakotven\u00fd v\u00a0Delegovan\u00e9m aktu Evropsk\u00e9 komise o pravidlech pro v\u00fdrobu obnoviteln\u00fdch paliv nebiologick\u00e9ho p\u016fvodu\u00a0(RFNBO) dopl\u0148uj\u00edc\u00ed sm\u011brnici\u00a0RED.\u00a0","kategorie":"Bezpe\u010dnost a normy","subkategorie":"Evropsk\u00e9 p\u0159edpisy a sm\u011brnice","datum":"2025-04-29"},{"pojem":"Agentura Evropsk\u00e9 unie pro spolupr\u00e1ci energetick\u00fdch regula\u010dn\u00edch org\u00e1n\u016f","doslovny":"European Union Agency for the Cooperation of Energy Regulators","zkratka":"ACER","popis":"Podporuju spolupr\u00e1ci mezi vnitrost\u00e1tn\u00edmi regula\u010dn\u00edmi org\u00e1ny v oblasti energetiky v EU (fungov\u00e1n\u00ed jednotn\u00e9ho evropsk\u00e9ho trhu s elektrou a se zemn\u00edm plynem). V\u00a0budoucnu bude do gesce ACER spadat i jednotn\u00fd trh s\u00a0vod\u00edkem.","kategorie":"Instituce a organizace","subkategorie":"Evropsk\u00e9 instituce","datum":"2025-04-29"},{"pojem":"Akceleraci\u00e1 z\u00f3ny","doslovny":"","zkratka":"","popis":"Konkr\u00e9tn\u00ed m\u00edsto nebo oblast (pevnina, mo\u0159e, vnitrozemsk\u00e9 vody), kter\u00e9 byly \u010dlenck\u00fdm st\u00e1tem ur\u010deny za obzvl\u00e1\u0161\u0165 vhodn\u00e9 pro instalaci za\u0159\u00edzen\u00ed na v\u00fdrobu energie z obnoviteln\u00fdch zdroj\u016f. St\u00e1ty ktomu vyb\u00edz\u00ed sm\u011brnice\u00a0RED. Bude zde zjednodu\u0161en\u00e9 \u0159\u00edzen\u00ed pro v\u00fdstavbu OZE; sm\u011brnice\u00a0RED\u00a0stan\u00edov\u00ed p\u0159\u00edmo, jak\u00fdm zp\u016fsobem a v jak\u00fdch lh\u016ft\u00e1ch bude v akcelerac\u00edch z\u00f3n\u00e1ch prob\u00edhat povolovac\u00ed \u0159\u00edzen\u00ed pro v\u00fdstavbu obnoviteln\u00fdch zdroj\u016f energie.","kategorie":"Ekonomika a trh","subkategorie":"Dotace a pob\u00eddky","datum":"2025-04-29"},{"pojem":"Alternativn\u00ed paliva","doslovny":"","zkratka":"","popis":"Paliva nebo zdroje energie, kter\u00e9 v\u00a0r\u00e1mci energie pou\u017e\u00edvan\u00e9 v\u00a0doprav\u011b slou\u017e\u00ed alespo\u0148 z\u010d\u00e1sti jako n\u00e1hrada zdroj\u016f fossiln\u00edch paliv a\u00a0kter\u00e9 maj\u00ed potenci\u00e1l p\u0159isp\u011bt k\u00a0jej\u00ed dekarbonizaci a\u00a0zv\u00fd\u0161it environmentaln\u00ed v\u00fdkonnost odv\u011btv\u00ed dopravy. Zahrnuj\u00ed elektinu, vod\u00edk, amoniak a\u00a0obnoviteln\u00e1 paliva\u00a0jako bioplyn. Alternativn\u00ed paliva jsou definov\u00e1na v\u00a0\u010dl. 2 Na\u0159\u00edzen\u00ed o zav\u00e1d\u011bn\u00ed infrastruktury pro alternativn\u00ed paliva.","kategorie":"Aplikace","subkategorie":"Doprava","datum":"2025-04-29"},{"pojem":"Ammonia jako m\u00e9dium pro skladov\u00e1n\u00ed a p\u0159epravu vod\u00edku","doslovny":"","zkratka":"","popis":"Pou\u017eit\u00ed amoniaku (NH\u2083) jako nosi\u010de vod\u00edku, kter\u00fd m\u016f\u017ee b\u00fdt ekonomicky v\u00fdhodn\u00fd pro p\u0159epravu na velk\u00e9 vzd\u00e1lenosti.","kategorie":"Aplikace","subkategorie":"Doprava","datum":"2025-08-07"},{"pojem":"Analyz\u00e1tor plyn\u016f","doslovny":"","zkratka":"","popis":"Za\u0159\u00edzen\u00ed pro detekci a m\u011b\u0159en\u00ed slo\u017een\u00ed plyn\u00e9 sm\u011bsi, zejm\u00e9na koncentrace vod\u00edku.","kategorie":"Bezpe\u010dnost a normy","subkategorie":"Technick\u00e9 parametry a zkou\u0161ky","datum":"2025-03-10"},{"pojem":"Aniontov\u00e1 v\u00fdm\u011bnn\u00e1 membr\u00e1na","doslovny":"Anion exchange membrane","zkratka":"AEM","popis":"Speci\u00e1ln\u00ed membr\u00e1na, kter\u00e1 propou\u0161t\u00ed anionty a blokuje kationty. Tyto membr\u00e1ny jsou kl\u00ed\u010dov\u00fdmi komponenty r\u016fzn\u00fdch elektrochemick\u00fdch za\u0159\u00edzen\u00ed, jako jsou palivov\u00e9 \u010dl\u00e1nky, vodn\u00ed elektrolyz\u00e9ry a redoxn\u00ed pr\u016ftokov\u00e9 baterie. AEM se skl\u00e1daj\u00ed z polymern\u00edho z\u00e1kladu s kladn\u011b nabit\u00fdmi funk\u010dn\u00edmi skupinami, kter\u00e9 umo\u017e\u0148uj\u00ed transport aniont\u016f, obvykle za pomoci molekul vody.","kategorie":"V\u00fdroba","subkategorie":"Elektrol\u00fdza","datum":"2025-03-12"},{"pojem":"Aukce jako slu\u017eba","doslovny":"Auction as a service","zkratka":"A-as-a-S","popis":"Platforma pro \u010dlensk\u00e9 st\u00e1ty EU, skrze kterou mohou st\u00e1ty vyd\u011blit \u010d\u00e1st sv\u00fdch vlastn\u00edch finan\u010dn\u00edch prost\u0159edk\u016f do Evropsk\u00e9 vod\u00edkov\u00e9 banky. O tyto prost\u0159edky pak mohou sout\u011b\u017eit jen projekty z dan\u00e9ho \u010dlensk\u00e9ho st\u00e1tu. Aukce prob\u00edhaj\u00ed spole\u010dn\u011b s aukc\u00ed Evropsk\u00e9 vod\u00edkov\u00e9 banky v r\u00e1mci Inova\u010dn\u00edho fondu.","kategorie":"Ekonomika a trh","subkategorie":"Slu\u017eby a platformy","datum":"2025-04-29"},{"pojem":"Autotermi\u010dn\u00ed reforming","doslovny":"Autothermal reforming","zkratka":"ATR","popis":"Kombinace parn\u00edho reformingu a \u010d\u00e1ste\u010dn\u00e9 oxidace, kde je proces energeticky sob\u011bsta\u010dn\u00fd (autotermi\u010dn\u00ed).","kategorie":"V\u00fdroba","subkategorie":"Reformov\u00e1n\u00ed","datum":"2025-08-12"},{"pojem":"Biol\u00fdza","doslovny":"","zkratka":"","popis":"Biol\u00fdza vody je proces v\u00fdroby vod\u00edku z vody pomoc\u00ed mikroorganismu\u016f, jako jsou bakterie nebo \u0159asy, kter\u00e9 produkuj\u00ed vod\u00edk fermantac\u00ed nebo fotosyntez\u00f3u. Jedn\u00e1 se o ud\u017eiteln\u00fd a ekologick\u00fd proces, ale st\u00e1le se vyv\u00edj\u00ed a m\u00e1 omezen\u00e9 zdroje.","kategorie":"V\u00fdroba","subkategorie":"Biologick\u00e9 procesy","datum":"2025-08-12"},{"pojem":"Bio-termol\u00fdza","doslovny":"","zkratka":"","popis":"Termick\u00fd proces vyu\u017e\u00edvaj\u00edc\u00ed biomasu pro v\u00fdrobu vod\u00edku.","kategorie":"V\u00fdroba","subkategorie":"Biologick\u00e9 procesy","datum":"2025-08-12"},{"pojem":"Bio-vod\u00edk","doslovny":"","zkratka":"","popis":"Produkce vod\u00edku z biomasy pomoc\u00ed biologick\u00fdch proces\u016f.","kategorie":"V\u00fdroba","subkategorie":"Biologick\u00e9 procesy","datum":"2025-08-12"},{"pojem":"CBAM (2023/956)","doslovny":"Odkaz","zkratka":"","popis":"Na\u0159\u00edzen\u00ed, kter\u00fdm se zav\u00e1d\u00ed mechanismus uhl\u00edkov\u00e9ho vyrovn\u00e1n\u00ed na hranic\u00edch.","kategorie":"Bezpe\u010dnost a normy","subkategorie":"Evropsk\u00e9 p\u0159edpisy a sm\u011brnice","datum":"2025-04-29"},{"pojem":"Certifik\u00e1t udr\u017eitelnosti","doslovny":"certificate of sustainability","zkratka":"","popis":"Jedn\u00e1 se o certifik\u00e1t, kter\u00fd slou\u017e\u00ed k ov\u011b\u0159en\u00ed udr\u017eitelnosti paliva. Podm\u00ednkou pro vyd\u00e1n\u00ed certifik\u00e1tu udr\u017eitelnosti je spln\u011bn\u00ed krit\u00e9ri\u00ed, kter\u00e9 jsou definov\u00e1ny ve Sm\u011brnici na podporu vyu\u017e\u00edv\u00e1n\u00ed obnoviteln\u00fdch zdroj\u016f energie (RED).","kategorie":"Bezpe\u010dnost a normy","subkategorie":"Evropsk\u00e9 p\u0159edpisy a sm\u011brnice","datum":"2025-04-29"},{"pojem":"CSA HGV 4.3","doslovny":"Test methods for hydrogen fueling parameter evaluation","zkratka":"","popis":"Testovac\u00ed metody pro hodnocen\u00ed parametr\u016f pln\u011bn\u00ed vod\u00edku. Pou\u017e\u00edv\u00e1 se pro validaci protokolu MC Formula","kategorie":"Pln\u00edc\u00ed infrastruktura","subkategorie":"Pln\u00edc\u00ed protokoly","datum":"2025-08-12"},{"pojem":"\u010casov\u00e1 korelace","doslovny":"temporall correlation","zkratka":"","popis":"Princip zakotven\u00fd v Delegovan\u00e9m aktu Evropsk\u00e9 komise o pravidlech pro v\u00fdrobu obnoviteln\u00fdch paliv nebiologick\u00e9ho p\u016fvodu (RFNBO) dopl\u0148uj\u00edc\u00e ,"popis":"Ji\u017e existuj\u00edc\u00ed podzemn\u00ed z\u00e1sobn\u00edky, kter\u00e9 lze p\u0159izp\u016fsobit pro skladov\u00e1n\u00ed vod\u00edku.","kategorie":"Skladov\u00e1n\u00ed a p\u0159eprava","subkategorie":"Stla\u010den\u00fd plyn","datum":"2025-08-07"},{"pojem":"WEH","doslovny":"","zkratka":"","popis":"Jeden z v\u00fdrobc\u016f za\u0159\u00edzen\u00ed pro v\u00fddej vod\u00edku.","kategorie":"Pln\u00edc\u00ed infrastruktura","subkategorie":"Za\u0159\u00edzen\u00ed \u010derpac\u00edch stanic","datum":"2025-03-10"},{"pojem":"X80 potrub\u00ed ocel","doslovny":"","zkratka":"","popis":"Typ vysokopevnostn\u00ed oceli pou\u017e\u00edvan\u00e9 pro plynov\u00e1 potrub\u00ed.","kategorie":"Fyzik\u00e1ln\u00ed a chemick\u00e9 principy","subkategorie":"Materi\u00e1lov\u00e1 v\u011bda","datum":"2025-08-07"},{"pojem":"Zachyc\u00e1v\u00e1n\u00ed, vyu\u017e\u00edv\u00e1n\u00ed a ukl\u00e1d\u00e1n\u00ed uhl\u00edku","doslovny":"carbon capture and storage\/carbon capture and utilization","zkratka":"CCS\/CCU","popis":"Ozna\u010duje ucel\u00e9n\u00fd soubor technologi\u00ed umo\u017e\u0148uj\u00edc\u00edch zachyt\u00e1v\u00e1n\u00ed, ukl\u00e1d\u00e1n\u00ed a vyu\u017eit\u00ed uhl\u00edku (CO\u2082).","kategorie":"Fyzik\u00e1ln\u00ed a chemick\u00e9 principy","subkategorie":"Chemick\u00e9 procesy","datum":"2025-04-29"},{"pojem":"Zelen\u00fd vod\u00edk","doslovny":"Renewable Hydrogen","zkratka":"RH\u2082","popis":"Vod\u00edk z\u00edskan\u00fd z obnoviteln\u00fdch zdroj\u016f energie.","kategorie":"V\u00fdroba","subkategorie":"Klasifikace podle zdroje","datum":"2025-03-10"},{"pojem":"Zpetn\u00e9 z\u00edsk\u00e1v\u00e1n\u00ed vod\u00edku","doslovny":"Hydrogen recovery","zkratka":"","popis":"Proces z\u00edsk\u00e1v\u00e1n\u00ed vod\u00edku z odpadn\u00edch proud\u016f nebo plyn\u016f.","kategorie":"V\u00fdroba","subkategorie":"\u010ci\u0161t\u011bn\u00ed a separace","datum":"2025-08-12"},{"pojem":"Zpetn\u00fd ventil","doslovny":"","zkratka":"","popis":"Mechanick\u00fd ventil zabran\u011bj\u00edc\u00ed zptn\u00e9mu proud\u011bn\u00ed vod\u00edku v potrub\u00ed.","kategorie":"Skladov\u00e1n\u00ed a p\u0159eprava","subkategorie":"P\u0159epravni a distribu\u010dn\u00ed s\u00edt\u011b","datum":"2025-03-10"},{"pojem":"Zply\u0148ov\u00e1n\u00ed","doslovny":"Gasification","zkratka":"","popis":"Proces, p\u0159i kter\u00e9m jsou uhl\u00edkat\u00e9 materi\u00e1ly (uhl\u00ed, biomasa) p\u0159em\u011b\u0148ov\u00e1ny na sm\u011bs plyn\u016f (syngas).","kategorie":"V\u00fdroba","subkategorie":"Pyrol\u00fdza a termick\u00e9 procesy","datum":"2025-08-12"},{"pojem":"Zply\u0148ov\u00e1n\u00ed uhl\u00ed","doslovny":"","zkratka":"","popis":"Specifick\u00fd proces zply\u0148ov\u00e1n\u00ed, kde je jako surovina pou\u017eito uhl\u00ed pro v\u00fdrobu vod\u00edku.","kategorie":"V\u00fdroba","subkategorie":"Pyrol\u00fdza a termick\u00e9 procesy","datum":"2025-08-12"},{"pojem":"Plynojem","doslovny":"","zkratka":"","popis":"Skladovac\u00ed za\u0159\u00edzen\u00ed pro plyn zahrnuj\u00edc\u00ed nadzemn\u00ed a podzemn\u00ed sklady plyn\u016f.","kategorie":"","subkategorie":"","datum":"2025-10-02"},{"pojem":"Vysokotlak\u00fd vod\u00edk","doslovny":"","zkratka":"","popis":"","kategorie":"","subkategorie":"","datum":"2026-02-23"},{"pojem":"Podchlazn\u00fd vod\u00edk","doslovny":"","zkratka":"","popis":"","kategorie":"","subkategorie":"","datum":"2026-02-23"}];

// State
let state = { query: '', cat: '', alpha: '', sort: 'az' };

// Category colors
const CAT_COLORS = {
  'Výroba': '#0057b8',
  'Bezpečnost a normy': '#dc2626',
  'Ekonomika a trh': '#16a34a',
  'Fyzikální a chemické principy': '#7c3aed',
  'Instituce a organizace': '#b45309',
  'Plnící infrastruktura': '#0891b2',
  'Skladování a přeprava': '#ea580c',
  'Aplikace': '#be185d',
};

function highlight(text, q) {
  if (!q || !text) return text || '';
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function getLetters() {
  return [...new Set(DATA.map(d => d.pojem[0].toUpperCase()))].sort((a,b) => a.localeCompare(b,'cs'));
}

function filterData() {
  let d = DATA.filter(item => item.pojem && item.pojem.trim());
  if (state.cat) d = d.filter(i => i.kategorie === state.cat);
  if (state.alpha) d = d.filter(i => i.pojem[0].toUpperCase() === state.alpha);
  if (state.query) {
    const q = state.query.toLowerCase();
    d = d.filter(i =>
      (i.pojem && i.pojem.toLowerCase().includes(q)) ||
      (i.zkratka && i.zkratka.toLowerCase().includes(q)) ||
      (i.popis && i.popis.toLowerCase().includes(q)) ||
      (i.doslovny && i.doslovny.toLowerCase().includes(q))
    );
  }
  if (state.sort === 'az') d.sort((a,b) => a.pojem.localeCompare(b.pojem, 'cs'));
  else if (state.sort === 'za') d.sort((a,b) => b.pojem.localeCompare(a.pojem, 'cs'));
  else if (state.sort === 'newest') d.sort((a,b) => (b.datum||'').localeCompare(a.datum||''));
  return d;
}

function getCatCounts() {
  const counts = {};
  DATA.filter(d=>d.pojem).forEach(d => {
    const k = d.kategorie || '';
    if (k) counts[k] = (counts[k]||0)+1;
  });
  return counts;
}

function renderCategories() {
  const counts = getCatCounts();
  const cats = Object.entries(counts).sort((a,b) => a[0].localeCompare(b[0],'cs'));
  const list = document.getElementById('catList');
  list.innerHTML = cats.map(([cat, cnt]) => `
    <button class="cat-btn${state.cat===cat?' active':''}" data-cat="${cat}" style="${state.cat===cat?`border-left:3px solid ${CAT_COLORS[cat]||'#0057b8'};padding-left:calc(1.25rem - 3px)`:''}" >
      <span>${cat}</span>
      <span class="cat-count">${cnt}</span>
    </button>
  `).join('');
  document.getElementById('countAll').textContent = DATA.filter(d=>d.pojem).length;
  list.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cat = btn.dataset.cat === state.cat ? '' : btn.dataset.cat;
      state.alpha = '';
      renderAll();
    });
  });
  document.querySelector('.cat-btn.active[data-cat=""]').addEventListener('click', () => {
    state.cat = '';
    state.alpha = '';
    renderAll();
  });
}

function renderAlpha() {
  const letters = getLetters();
  const filtered = filterData();
  const activeLetters = new Set(filtered.map(d => d.pojem[0].toUpperCase()));
  const nav = document.getElementById('alphaNav');
  nav.innerHTML = letters.map(l => `
    <button class="alpha-btn${state.alpha===l?' active':''}${!activeLetters.has(l)?' disabled':''}" data-l="${l}">${l}</button>
  `).join('');
  nav.querySelectorAll('.alpha-btn:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', () => {
      state.alpha = btn.dataset.l === state.alpha ? '' : btn.dataset.l;
      renderAll();
    });
  });
}

function renderCards() {
  const filtered = filterData();
  const grid = document.getElementById('cardsGrid');
  const q = state.query;

  document.getElementById('statCount').textContent = filtered.length;
  document.getElementById('resultsCount').innerHTML = filtered.length === DATA.length
    ? `Zobrazeno <strong>všech ${filtered.length}</strong> pojmů`
    : `Nalezeno <strong>${filtered.length}</strong> pojmů`;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>Nic nenalezeno</h3><p>Zkus jiný výraz nebo zruš filtry.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((item, idx) => {
    const color = CAT_COLORS[item.kategorie] || '#6b7280';
    return `
    <div class="card" data-idx="${idx}" style="border-left: 3px solid ${color}">
      <div class="card-header">
        <div class="card-title-area">
          <div class="card-pojem">${highlight(item.pojem, q)}</div>
          <div class="card-meta">
            ${item.zkratka ? `<span class="tag tag-zkratka">${highlight(item.zkratka, q)}</span>` : ''}
            ${item.kategorie ? `<span class="tag tag-cat">${item.kategorie}</span>` : ''}
            ${item.subkategorie ? `<span class="tag tag-sub">${item.subkategorie}</span>` : ''}
            ${item.doslovny && item.doslovny !== 'Odkaz' ? `<span class="tag tag-en">${item.doslovny}</span>` : ''}
          </div>
        </div>
        <svg class="card-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="card-body">
        <div class="card-popis">${highlight(item.popis || '<em style="color:#aaa">Popis zatím chybí.</em>', q)}</div>
        ${item.datum ? `<div class="card-footer-info"><span>📅 ${item.datum}</span></div>` : ''}
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => card.classList.toggle('expanded'));
  });
}

function renderAll() {
  renderCategories();
  renderAlpha();
  renderCards();
}

// Init
document.getElementById('searchInput').addEventListener('input', e => {
  state.query = e.target.value;
  document.getElementById('clearBtn').style.display = state.query ? 'block' : 'none';
  state.alpha = '';
  renderAll();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  state.query = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  renderAll();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  state.sort = e.target.value;
  renderCards();
});

document.querySelector('.cat-btn').addEventListener('click', () => {
  state.cat = '';
  state.alpha = '';
  renderAll();
});

renderAll();
</script>
</body>
</html>
