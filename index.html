<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vodíkový slovník</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5; --surface: #fff; --navy: #0a1628; --blue: #0057b8;
    --blue-light: #e6f0fc; --accent: #00c2e0; --text: #1a1f2e;
    --muted: #6b7280; --border: #e2e6ed; --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header { background: var(--navy); padding: 0 2rem; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 2rem; height: 64px; border-bottom: 2px solid var(--accent); }
  .logo { font-family: "Space Mono", monospace; font-size: 1rem; color: #fff; display: flex; align-items: center; gap: 0.5rem; white-space: nowrap; }
  .logo-h2 { color: var(--accent); font-size: 1.4rem; font-weight: 700; }
  .search-wrap { flex: 1; max-width: 560px; position: relative; }
  .search-wrap input { width: 100%; padding: 0.55rem 2rem 0.55rem 2.6rem; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #fff; font-size: 0.95rem; font-family: "DM Sans", sans-serif; outline: none; transition: border-color 0.2s; }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.45); }
  .search-wrap input:focus { border-color: var(--accent); background: rgba(255,255,255,0.12); }
  .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); pointer-events: none; }
  .clear-btn { position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.5); padding: 0.2rem; display: none; font-size: 1rem; }
  .clear-btn:hover { color: #fff; }
  .header-stats { font-family: "Space Mono", monospace; font-size: 0.72rem; color: rgba(255,255,255,0.45); white-space: nowrap; margin-left: auto; }
  .count-highlight { color: var(--accent); }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 248px 1fr; min-height: calc(100vh - 64px); }

  /* SIDEBAR */
  aside { background: var(--surface); border-right: 1px solid var(--border); padding: 1.25rem 0; overflow-y: auto; position: sticky; top: 64px; height: calc(100vh - 64px); }
  .sidebar-title { font-family: "Space Mono", monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 0 1rem 0.75rem; }

  .cat-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 0.5rem 1rem; border: none; background: none;
    cursor: pointer; text-align: left; font-family: "DM Sans", sans-serif;
    font-size: 0.875rem; color: var(--text); transition: background 0.15s, color 0.15s;
    gap: 0.5rem; border-left: 3px solid transparent;
  }
  .cat-btn:hover { background: var(--bg); }
  .cat-btn.all-btn { color: var(--text); }
  .cat-btn.all-btn.active { background: var(--blue-light); color: var(--blue); font-weight: 600; border-left-color: var(--blue); }
  .cat-btn.active { font-weight: 600; }

  .cat-label { display: flex; align-items: center; gap: 0.5rem; flex: 1; }
  .cat-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .cat-count { font-family: "Space Mono", monospace; font-size: 0.7rem; padding: 0.1rem 0.45rem; border-radius: 100px; min-width: 26px; text-align: center; flex-shrink: 0; background: rgba(0,0,0,0.06); color: var(--muted); }
  .cat-btn.active .cat-count { color: #fff; }

  .divider { height: 1px; background: var(--border); margin: 0.75rem 1rem; }

  /* MAIN */
  main { padding: 1.75rem 2rem; }
  .alpha-nav { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1.5rem; }
  .alpha-btn { font-family: "Space Mono", monospace; font-size: 0.72rem; padding: 0.25rem 0.45rem; border: 1px solid var(--border); background: var(--surface); border-radius: 5px; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .alpha-btn:hover { border-color: var(--blue); color: var(--blue); }
  .alpha-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .alpha-btn.disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; min-height: 28px; }
  .results-count { font-size: 0.85rem; color: var(--muted); }
  .results-count strong { color: var(--text); }
  .sort-select { font-family: "DM Sans", sans-serif; font-size: 0.8rem; padding: 0.3rem 0.7rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; outline: none; }

  /* CARDS */
  .cards-grid { display: grid; gap: 0.875rem; }
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.1rem 1.25rem; cursor: pointer; transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s; border-left-width: 3px; }
  .card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
  .card.expanded { box-shadow: 0 0 0 2px rgba(0,87,184,0.1); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .card-title-area { flex: 1; min-width: 0; }
  .card-pojem { font-size: 1rem; font-weight: 600; line-height: 1.4; color: var(--text); }
  .card-pojem mark { background: #fff3b0; border-radius: 2px; padding: 0 1px; color: inherit; }
  .card-zkratka { font-family: "Space Mono", monospace; font-size: 0.8rem; font-weight: 500; color: #b45309; margin-left: 3px; }
  .card-doslovny { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 0.2rem; line-height: 1.4; }
  .card-doslovny mark { background: #fff3b0; border-radius: 2px; padding: 0 1px; color: inherit; font-style: normal; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.45rem; }
  .tag { font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 100px; font-weight: 500; white-space: nowrap; }
  .tag-cat { background: #eef4ff; color: #2563eb; }
  .tag-sub { background: #f1f5f9; color: #475569; }
  .card-chevron { color: var(--muted); flex-shrink: 0; margin-top: 3px; transition: transform 0.2s; }
  .card.expanded .card-chevron { transform: rotate(180deg); }
  .card-body { display: none; margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid var(--border); animation: fadeIn 0.2s ease; }
  .card.expanded .card-body { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .card-popis { font-size: 0.9rem; line-height: 1.7; color: #374151; }
  .card-popis mark { background: #fff3b0; border-radius: 2px; padding: 0 1px; color: inherit; }
  .card-footer-info { margin-top: 0.75rem; font-size: 0.75rem; color: var(--muted); }

  .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    main { padding: 1rem; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-h2">H₂</span><span>Slovník</span></div>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="Hledat pojem, zkratku, popis…" autocomplete="off">
    <button class="clear-btn" id="clearBtn">✕</button>
  </div>
  <div class="header-stats"><span class="count-highlight" id="statCount">203</span> pojmů</div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-title">Kategorie</div>
    <button class="cat-btn all-btn active" data-cat="">
      <span class="cat-label">Vše</span>
      <span class="cat-count" id="countAll">203</span>
    </button>
    <div class="divider"></div>
    <div id="catList"></div>
  </aside>
  <main>
    <nav class="alpha-nav" id="alphaNav"></nav>
    <div class="results-bar">
      <div class="results-count" id="resultsCount"></div>
      <select class="sort-select" id="sortSelect">
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="newest">Nejnovější</option>
      </select>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </main>
</div>

<script>
const DATA = [{"pojem": "Adaptivní regulace", "doslovny": "", "zkratka": "", "popis": "Automatické přizpůsobení provozních parametrů (např. tlaku, průtoku) na základě aktuálních podmínek.", "kategorie": "Výroba", "subkategorie": "Elektrolýza", "url": ""}, {"pojem": "Adicionalita", "doslovny": "", "zkratka": "", "popis": "Jedná se o princip zakotvený v Delegovaném aktu Evropské komise o pravidlech pro výrobu obnovitelných paliv nebiologického původu (RFNBO) doplňující směrnici RED.", "kategorie": "Bezpečnost a normy", "subkategorie": "Evropské předpisy a směrnice", "url": ""}, {"pojem": "Agentura Evropské unie pro spolupráci energetických regulačních orgánů", "doslovny": "European Union Agency for the Cooperation of Energy Regulators", "zkratka": "ACER", "popis": "Podporuju spolupráci mezi vnitrostátními regulačními orgány v oblasti energetiky v EU (fungování jednotného evropského trhu s elektřinou a se zemním plynem). V budoucnu bude do gesce ACER spadat i jednotný trh s vodíkem.", "kategorie": "Instituce a organizace", "subkategorie": "Evropské instituce", "url": ""}, {"pojem": "Akcelerační zóny", "doslovny": "", "zkratka": "", "popis": "Konkrétní místo nebo oblast (pevnina, moře, vnitrozemské vody), které byly členským státem určeny za zvláště vhodné pro instalaci zařízení na výrobu energie z obnovitelných zdrojů. Státy ktomu vyzývá směrnice RED. Bude zde zjednodušené řízení pro výstavbu OZE; směrnice RED stanoví přímo, jakým způsobem a v jakých lhůtách bude v akceleračních zónách probíhat povolovací řízení pro výstavbu obnovitelných zdrojů energie.", "kategorie": "Ekonomika a trh", "subkategorie": "Dotace a pobídky", "url": ""}, {"pojem": "Alternativní paliva", "doslovny": "", "zkratka": "", "popis": "Paliva nebo zdroje energie, které v rámci energie používané v dopravě slouží alespoň zčásti jako náhrada zdrojů fosilních paliv a které mají potenciál přispět k její dekarbonizaci a zvýšit environmentální výkonnost odvětví dopravy. Zahrnují elektřinu, vodík, amoniak a obnovitelná paliva jako bioplyn. Alternativní paliva jsou definována v čl. 2 Nařízení o zavádění infrastruktury pro alternativní paliva.", "kategorie": "Aplikace", "subkategorie": "Doprava", "url": ""}, {"pojem": "Ammonia jako médium pro skladování a přepravu vodíku", "doslovny": "", "zkratka": "", "popis": "Použití amoniaku (NH₃) jako nosiče vodíku, který může být ekonomicky výhodný pro přepravu na velké vzdálenosti.", "kategorie": "Aplikace", "subkategorie": "Doprava", "url": ""}, {"pojem": "Analyzátor plynů", "doslovny": "", "zkratka": "", "popis": "Zařízení pro detekci a měření složení plynné směsi, zejména koncentrace vodíku.", "kategorie": "Bezpečnost a normy", "subkategorie": "Technické parametry a zkoušky", "url": ""}, {"pojem": "Aniontová výměnná membrána", "doslovny": "Anion exchange membrane", "zkratka": "AEM", "popis": "Speciální membrána, která propouští anionty a blokuje kationty. Tyto membrány jsou klíčovými komponenty různých elektrochemických zařízení, jako jsou palivové články, vodní elektrolyzéry a redoxní průtokové baterie. AEM se skládají z polymerního základu s kladně nabitými funkčními skupinami, které umožňují transport aniontů, obvykle za pomoci molekul vody.", "kategorie": "Výroba", "subkategorie": "Elektrolýza", "url": ""}, {"pojem": "Aukce jako služba", "doslovny": "Auction as a service", "zkratka": "A-as-a-S", "popis": "Platforma pro členské státy EU, skrze kterou mohou státy vyčlenit část svých vlastních finančních prostředků do Evropské vodíkové banky. O tyto prostředky pak mohou soutěžit jen projekty z daného členského státu. Aukce probíhají společně s aukcí Evropské vodíkové banky v rámci Inovačního fondu.", "kategorie": "Ekonomika a trh", "subkategorie": "Služby a platformy", "url": ""}, {"pojem": "Autotermní reforming", "doslovny": "Autothermal reforming", "zkratka": "ATR", "popis": "Kombinace parního reformingu a částečné oxidace, kde je proces energeticky soběstačný (autotermní).", "kategorie": "Výroba", "subkategorie": "Reformování", "url": ""}, {"pojem": "Biolýza", "doslovny": "", "zkratka": "", "popis": "Biolýza vody je proces výroby vodíku z vody pomocí mikroorganismů, jako jsou bakterie nebo řasy, které produkují vodík fermentací nebo fotosyntézou. Jedná se o udržitelnou a ekologickou metodu, ale stále se vyvíjí a má omezené zdroje.", "kategorie": "Výroba", "subkategorie": "Biologické procesy", "url": ""}, {"pojem": "Bio-termolýza", "doslovny": "", "zkratka": "", "popis": "Termický proces využívající biomasu pro výrobu vodíku.", "kategorie": "Výroba", "subkategorie": "Biologické procesy", "url": ""}, {"pojem": "Bio-vodík", "doslovny": "", "zkratka": "", "popis": "Produkce vodíku z biomasy pomocí biologických procesů.", "kategorie": "Výroba", "subkategorie": "Biologické procesy", "url": ""}, {"pojem": "CBAM (2023/956)", "doslovny": "", "zkratka": "", "popis": "Nařízení, kterým se zavádí mechanismus uhlíkového vyrovnání na hranicích.", "kategorie": "Bezpečnost a normy", "subkategorie": "Evropské předpisy a směrnice", "url": "https://eur-lex.europa.eu/legal-content/CS/TXT/HTML/?uri=CELEX:32023R1805&qid=1721114847847"}, {"pojem": "Certifikát udržitelnosti", "doslovny": "certificate of sustainability", "zkratka": "", "popis": "Jedná se o certifikát, který slouží k ověření udržitelnosti paliva. Podmínkou pro vydání certifikátu udržitelnosti je splnění kritérií, které jsou definovány ve Směrnici na podporu využívání obnovitelných zdrojů energie (RED).", "kategorie": "Bezpečnost a normy", "subkategorie": "Evropské předpisy a směrnice", "url": ""}, {"pojem": "CSA HGV 4.3", "doslovny": "Test methods for hydrogen fueling parameter evaluation", "zkratka": "", "popis": "Testovací metody pro hodnocení parametrů plnění vodíku. Používá se pro validaci protokolu MC Formula", "kategorie": "Plnící infrastruktura", "subkategorie": "Plnící protokoly", "url": ""}, {"pojem": "Časová korelace", "doslovny": "temporall correlation", "zkratka": "", "popis": "Princip zakotvený v Delegovaném aktu Evropské komise o pravidlech pro výrobu obnovitelných paliv nebiologického původu (RFNBO) doplňující směrnici RED. Časová korelace stanovuje, že množství elektrické energie spotřebované v elektrolyzéru musí být v určitém časovém období propojeno s vyrobenou elektřinou u obnovitelného zdroje energie.", "kategorie": "Bezpečnost a normy", "subkategorie": "Evropské předpisy a směrnice", "url": ""}, {"pojem": "Částečná oxidace", "doslovny": "Partial oxidation", "zkratka": "POX", "popis": "Proces, při němž dochází k částečné oxidaci uhlovodíků za účelem výroby vodíku.", "kategorie": "Výroba", "subkategorie": "Reformování", "url": ""}, {"pojem": "Čerpací stanice na kapalný vodík", "doslovny": "Liquid Hydrogen Refueling Station", "zkratka": "LHRS", "popis": "Čerpací stanice, které skladují vodík v kapalném stavu a využívají inovativní strategie předchlazení pro snížení spotřeby energie při tankování.", "kategorie": "Plnící infrastruktura", "subkategorie": "Čerpací stanice", "url": ""}, {"pojem": "DA GHG (2023/1185)", "doslovny": "", "zkratka": "", "popis": "Nařízení v přenesené pravomoci stanovující minimální hodnoty pro úspory emisí skleníkových plynů z recyklovaných paliv s obsahem uhlíku a upřesněním metodiky pro posuzování úspor emisí skleníkových plynů z kapalných a plynných paliv z obnovitelných zdrojů nebiologického původu používaných v odvětví dopravy a z recyklovaných paliv s obsahem uhlíku.", "kategorie": "Bezpečnost a normy", "subkategorie": "Evropské předpisy a směrnice", "url": "https://eur-lex.europa.eu/legal-content/CS/TXT/HTML/?uri=CELEX:32023R1185"}, {"pojem": "DA k EU ETS (2024/873)", "doslovny": "", "zkratka": "", "popis": "Nařízení v přenesené pravomoci, pokud jde o přechodná pravidla harmonizovaného přidělování bezplatných povolenek na emise.", "kategorie": "Bezpečnost a normy", "subkategorie": "Evropské předpisy a směrnice", "url": "https://eur-lex.europa.eu/legal-content/CS/TXT/HTML/?uri=OJ:L_202400873"}, {"pojem": "DA RFNBO (2023/1184)", "doslovny": "", "zkratka": let state = { query: '', cat: '', alpha: '', sort: 'az' };

function hl(text, q) {
  if (!q || !text) return text || '';
  return text.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`);
}

function filterData() {
  let d = DATA.filter(i => i.pojem && i.pojem.trim());
  if (state.cat) d = d.filter(i => i.kategorie === state.cat);
  if (state.alpha) d = d.filter(i => i.pojem[0].toUpperCase() === state.alpha);
  if (state.query) {
    const q = state.query.toLowerCase();
    d = d.filter(i =>
      (i.pojem && i.pojem.toLowerCase().includes(q)) ||
      (i.zkratka && i.zkratka.toLowerCase().includes(q)) ||
      (i.popis && i.popis.toLowerCase().includes(q)) ||
      (i.doslovny && i.doslovny.toLowerCase().includes(q))
    );
  }
  if (state.sort === 'az') d.sort((a,b) => a.pojem.localeCompare(b.pojem,'cs'));
  else if (state.sort === 'za') d.sort((a,b) => b.pojem.localeCompare(a.pojem,'cs'));
  else d.sort((a,b) => (b.datum||'').localeCompare(a.datum||''));
  return d;
}

function renderCategories() {
  const counts = {};
  DATA.filter(d=>d.pojem).forEach(d => { if (d.kategorie) counts[d.kategorie] = (counts[d.kategorie]||0)+1; });
  const total = DATA.filter(d=>d.pojem).length;
  document.getElementById('countAll').textContent = total;

  // All button
  const allBtn = document.querySelector('.all-btn');
  allBtn.className = 'cat-btn all-btn' + (state.cat === '' ? ' active' : '');

  const cats = Object.entries(counts).sort((a,b) => a[0].localeCompare(b[0],'cs'));
  document.getElementById('catList').innerHTML = cats.map(([cat, cnt]) => {
    const c = CAT_COLORS[cat] || DEFAULT_COLOR;
    const isActive = state.cat === cat;
    return `<button class="cat-btn${isActive ? ' active' : ''}" data-cat="${cat}" style="
      border-left-color: ${c.border};
      ${isActive ? `background: ${c.bg};` : ''}
    ">
      <span class="cat-label">
        <span class="cat-swatch" style="background:${c.border}"></span>
        ${cat}
      </span>
      <span class="cat-count" style="${isActive ? `background:${c.border};` : ''}">${cnt}</span>
    </button>`;
  }).join('');

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cat = btn.dataset.cat === state.cat ? '' : btn.dataset.cat;
      state.alpha = '';
      renderAll();
    });
  });
}

function renderAlpha() {
  const filtered = filterData();
  const active = new Set(filtered.map(d => d.pojem[0].toUpperCase()));
  const all = [...new Set(DATA.filter(d=>d.pojem).map(d => d.pojem[0].toUpperCase()))].sort((a,b) => a.localeCompare(b,'cs'));
  document.getElementById('alphaNav').innerHTML = all.map(l =>
    `<button class="alpha-btn${state.alpha===l?' active':''}${!active.has(l)?' disabled':''}" data-l="${l}">${l}</button>`
  ).join('');
  document.querySelectorAll('.alpha-btn:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', () => { state.alpha = btn.dataset.l === state.alpha ? '' : btn.dataset.l; renderAll(); });
  });
}

function renderCards() {
  const filtered = filterData();
  const q = state.query;
  const total = DATA.filter(d=>d.pojem).length;
  document.getElementById('statCount').textContent = filtered.length;
  document.getElementById('resultsCount').innerHTML = filtered.length === total
    ? `Zobrazeno <strong>všech ${filtered.length}</strong> pojmů`
    : `Nalezeno <strong>${filtered.length}</strong> pojmů`;

  if (!filtered.length) {
    document.getElementById('cardsGrid').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>Nic nenalezeno</h3><p>Zkus jiný výraz nebo zruš filtry.</p></div>`;
    return;
  }

  document.getElementById('cardsGrid').innerHTML = filtered.map(item => {
    const c = CAT_COLORS[item.kategorie] || DEFAULT_COLOR;
    return `<div class="card" style="border-left-color:${c.border}; border-left-width:3px;">
      <div class="card-header">
        <div class="card-title-area">
          <div class="card-pojem">
            ${hl(item.pojem, q)}${item.zkratka ? ` <span class="card-zkratka">(${hl(item.zkratka, q)})</span>` : ''}
          </div>
          ${item.doslovny ? `<div class="card-doslovny">${hl(item.doslovny, q)}</div>` : ''}
          <div class="card-meta">
            ${item.kategorie ? `<span class="tag tag-cat" style="background:${c.bg};color:${c.text}">${item.kategorie}</span>` : ''}
            ${item.subkategorie ? `<span class="tag tag-sub">${item.subkategorie}</span>` : ''}
          </div>
        </div>
        <svg class="card-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="card-body">
        <div class="card-popis">${hl(item.popis || '<em style="color:#aaa">Popis zatím chybí.</em>', q)}</div>
        ${item.url ? `<div class="card-footer-info"><a href="${item.url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:0.35rem;color:#0057b8;font-size:0.8rem;font-weight:500;text-decoration:none;margin-top:0.5rem;padding:0.3rem 0.7rem;background:#eef4ff;border-radius:6px;border:1px solid #c7d9f5" onclick="event.stopPropagation()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Přejít na EUR-Lex
        </a></div>` : ''}
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => card.classList.toggle('expanded'));
  });
}

function renderAll() { renderCategories(); renderAlpha(); renderCards(); }

document.getElementById('searchInput').addEventListener('input', e => {
  state.query = e.target.value;
  document.getElementById('clearBtn').style.display = state.query ? 'block' : 'none';
  state.alpha = '';
  renderAll();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  state.query = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  renderAll();
});
document.getElementById('sortSelect').addEventListener('change', e => { state.sort = e.target.value; renderCards(); });

renderAll();
</script>
</body>
</html>
