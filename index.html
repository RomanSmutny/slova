<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H₂ Slovník pojmů</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5; --surface: #fff; --navy: #0a1628; --blue: #0057b8;
    --blue-light: #e6f0fc; --accent: #00c2e0; --text: #1a1f2e;
    --muted: #6b7280; --border: #e2e6ed; --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header { background: var(--navy); padding: 0 2rem; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 2rem; height: 64px; border-bottom: 2px solid var(--accent); }
  .logo { font-family: "Space Mono", monospace; font-size: 1rem; color: #fff; display: flex; align-items: center; gap: 0.5rem; white-space: nowrap; text-decoration: none; }
  .logo-h2 { color: var(--accent); font-size: 1.4rem; font-weight: 700; }
  .search-wrap { flex: 1; max-width: 560px; position: relative; }
  .search-wrap input { width: 100%; padding: 0.55rem 2rem 0.55rem 2.6rem; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #fff; font-size: 0.95rem; font-family: "DM Sans", sans-serif; outline: none; transition: border-color 0.2s; }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.45); }
  .search-wrap input:focus { border-color: var(--accent); background: rgba(255,255,255,0.12); }
  .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); pointer-events: none; }
  .clear-btn { position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.5); padding: 0.2rem; display: none; font-size: 1rem; }
  .clear-btn:hover { color: #fff; }
  .header-stats { font-family: "Space Mono", monospace; font-size: 0.72rem; color: rgba(255,255,255,0.45); white-space: nowrap; margin-left: auto; }
  .count-highlight { color: var(--accent); }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 248px 1fr; min-height: calc(100vh - 64px); }

  /* SIDEBAR */
  aside { background: var(--surface); border-right: 1px solid var(--border); padding: 1.25rem 0; overflow-y: auto; position: sticky; top: 64px; height: calc(100vh - 64px); }
  .sidebar-title { font-family: "Space Mono", monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 0 1rem 0.75rem; }
  .cat-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0.5rem 1rem; border: none; background: none; cursor: pointer; text-align: left; font-family: "DM Sans", sans-serif; font-size: 0.875rem; color: var(--text); transition: background 0.15s, color 0.15s; gap: 0.5rem; border-left: 3px solid transparent; }
  .cat-btn:hover { background: var(--bg); }
  .cat-btn.all-btn.active { background: var(--blue-light); color: var(--blue); font-weight: 600; border-left-color: var(--blue); }
  .cat-btn.active { font-weight: 600; }
  .cat-label { display: flex; align-items: center; gap: 0.5rem; flex: 1; }
  .cat-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .cat-count { font-family: "Space Mono", monospace; font-size: 0.7rem; padding: 0.1rem 0.45rem; border-radius: 100px; min-width: 26px; text-align: center; flex-shrink: 0; background: rgba(0,0,0,0.06); color: var(--muted); }
  .cat-btn.active .cat-count { color: #fff; }
  .subcat-list { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; }
  .subcat-list.open { max-height: 600px; }
  .cat-expand-icon { transition: transform 0.2s; color: var(--muted); flex-shrink: 0; }
  .cat-expand-icon.open { transform: rotate(90deg); }
  .subcat-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0.35rem 1rem 0.35rem 2rem; border: none; background: none; cursor: pointer; font-family: "DM Sans", sans-serif; font-size: 0.8rem; color: var(--muted); text-align: left; gap: 0.5rem; transition: background 0.15s, color 0.15s; }
  .subcat-btn:hover { background: var(--bg); color: var(--text); }
  .subcat-btn.active { background: var(--bg); color: var(--text); font-weight: 600; }
  .subcat-count { font-family: "Space Mono", monospace; font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 100px; background: rgba(0,0,0,0.06); color: var(--muted); flex-shrink: 0; }
  .divider { height: 1px; background: var(--border); margin: 0.75rem 1rem; }

  /* MAIN */
  main { padding: 1.75rem 2rem; }
  .alpha-nav { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1.5rem; }
  .alpha-btn { font-family: "Space Mono", monospace; font-size: 0.72rem; padding: 0.25rem 0.45rem; border: 1px solid var(--border); background: var(--surface); border-radius: 5px; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .alpha-btn:hover { border-color: var(--blue); color: var(--blue); }
  .alpha-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .alpha-btn.disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; min-height: 28px; }
  .results-count { font-size: 0.85rem; color: var(--muted); }
  .results-count strong { color: var(--text); }
  .sort-select { font-family: "DM Sans", sans-serif; font-size: 0.8rem; padding: 0.3rem 0.7rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; outline: none; }

  /* CARDS */
  .cards-grid { display: grid; gap: 0.875rem; }
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.1rem 1.25rem; cursor: pointer; transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s; border-left-width: 3px; }
  .card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
  .card.expanded { box-shadow: 0 0 0 2px rgba(0,87,184,0.1); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .card-title-area { flex: 1; min-width: 0; }
  .card-pojem { font-size: 1rem; font-weight: 600; line-height: 1.4; color: var(--text); }
  .card-pojem mark { background: #fff3b0; border-radius: 2px; padding: 0 1px; color: inherit; }
  .card-zkratka { font-family: "Space Mono", monospace; font-size: 0.8rem; font-weight: 500; color: #b45309; margin-left: 3px; }
  .card-doslovny { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 0.2rem; line-height: 1.4; }
  .card-doslovny mark { background: #fff3b0; border-radius: 2px; padding: 0 1px; color: inherit; font-style: normal; }
  .card-meta { display: flex; flex-direction: column; gap: 0.3rem; margin-top: 0.5rem; }
  .card-meta-primary { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .card-meta-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; }
  .tag { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 100px; font-weight: 600; white-space: nowrap; }
  .tag-cat { background: #eef4ff; color: #2563eb; }
  .tag-sub { background: #1e293b; color: #fff; border: 1px solid #1e293b; }
  .tag-extra { font-size: 0.65rem !important; padding: 0.12rem 0.45rem !important; font-weight: 400 !important; background: var(--bg) !important; border: 1px solid var(--border) !important; color: var(--muted) !important; }
  .tag-extra:hover { background: var(--blue-light) !important; color: var(--blue) !important; border-color: var(--blue) !important; }
  .card-chevron { color: var(--muted); flex-shrink: 0; margin-top: 3px; transition: transform 0.2s; }
  .card.expanded .card-chevron { transform: rotate(180deg); }
  .card-body { display: none; margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid var(--border); animation: fadeIn 0.2s ease; }
  .card.expanded .card-body { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .card-popis { font-size: 0.9rem; line-height: 1.7; color: #374151; }
  .card-popis mark { background: #fff3b0; border-radius: 2px; padding: 0 1px; color: inherit; }

  /* KONTEXT STROM */
  .card-kontext { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px dashed var(--border); }
  .kontext-label { font-family: "Space Mono", monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.45rem; }
  .kontext-tree { display: flex; align-items: center; flex-wrap: wrap; gap: 0; }
  .kontext-node { font-size: 0.75rem; color: var(--muted); white-space: nowrap; cursor: pointer; padding: 0.15rem 0.4rem; border-radius: 4px; transition: background 0.15s, color 0.15s; }
  .kontext-node:hover { background: var(--blue-light); color: var(--blue); }
  .kontext-node.current { font-weight: 600; color: var(--text); background: var(--bg); }
  .kontext-arrow { font-size: 0.7rem; color: #cbd5e1; margin: 0 0.1rem; }

  /* TAGY */
  .tag-extra { display: inline-block; font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: background 0.15s, color 0.15s; }
  .tag-extra:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }

  /* VIZ TAKÉ */
  .viz-take { margin-top: 0.85rem; padding-top: 0.75rem; border-top: 1px dashed var(--border); }
  .viz-take-label { font-family: "Space Mono", monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.45rem; }
  .viz-take-links { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .viz-take-link { font-size: 0.78rem; color: var(--blue); background: var(--blue-light); border: 1px solid #c7d9f5; border-radius: 5px; padding: 0.15rem 0.55rem; cursor: pointer; transition: background 0.15s; text-decoration: none; }
  .viz-take-link:hover { background: #dbeafe; }

  /* Oddělovač primární/sekundární pojmy */
  .subcat-divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0 1rem; color: var(--muted); font-size: 0.72rem; font-family: "Space Mono", monospace; letter-spacing: 0.08em; text-transform: uppercase; }
  .subcat-divider::before, .subcat-divider::after { content: ''; flex: 1; height: 2px; background: var(--border); }

  .card-link { display: inline-flex; align-items: center; gap: 0.35rem; color: #0057b8; font-size: 0.8rem; font-weight: 500; text-decoration: none; margin-top: 0.75rem; padding: 0.3rem 0.7rem; background: #eef4ff; border-radius: 6px; border: 1px solid #c7d9f5; }
  .card-link:hover { background: #dbeafe; }
  .card-link svg { flex-shrink: 0; }

  .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }

  /* SIDEBAR TABS */
  /* CARD TABS */
  .card-tabs { display: flex; gap: 0; margin-bottom: 0.9rem; border-bottom: 1px solid var(--border); }
  .card-tab { background: none; border: none; padding: 0.4rem 0.85rem; font-family: "DM Sans", sans-serif; font-size: 0.8rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
  .card-tab:hover { color: var(--text); }
  .card-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .card-tab-content.hidden { display: none; }
  .kontext-group-title { font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.6rem; }
  .tree-node.highlighted { font-weight: 700; box-shadow: 0 0 0 2px var(--blue); }

  /* TREE VISUALIZATION */
  .tree-wrap { overflow-x: auto; padding-bottom: 0.5rem; }
  .tree { list-style: none; padding: 0; margin: 0; }
  .tree ul { list-style: none; padding-left: 1.5rem; margin: 0; position: relative; }
  .tree li { position: relative; padding: 0.25rem 0; }
  .tree ul::before { content: ''; position: absolute; top: 0; bottom: 0.75rem; left: 0.625rem; width: 1px; background: var(--border); }
  .tree li::before { content: ''; position: absolute; top: 0.85rem; left: -0.875rem; width: 0.875rem; height: 1px; background: var(--border); }
  .tree > li::before { display: none; }

  .tree-node { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.3rem 0.65rem; border-radius: 20px; font-size: 0.8rem; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); white-space: nowrap; transition: all 0.15s; font-family: "DM Sans", sans-serif; max-width: 260px; }
  .tree-node:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); box-shadow: 0 1px 6px rgba(0,87,184,0.12); }
  .tree-node.root { font-weight: 700; font-size: 0.875rem; border-width: 2px; padding: 0.4rem 0.9rem; }
  .tree-node.missing { opacity: 0.45; cursor: default; border-style: dashed; }
  .tree-node.missing:hover { border-color: var(--border); color: var(--text); background: var(--surface); box-shadow: none; }
  .tree-node-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-node-abbr { font-family: "Space Mono", monospace; font-size: 0.68rem; color: #b45309; flex-shrink: 0; }

  .group-empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.9rem; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    main { padding: 1rem; }
    .header-stats { display: none; }
  }
</style>
</head>

<header>
  <a class="logo" href="../index.html"><span class="logo-h2">H₂</span><span>Slovník</span></a>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

      </div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </main>
</div>

ratka": "", "popis": "Chemické sloučeniny odvozené od molekul vodíku, které slouží především k jeho efektivnímu transportu a skladování na delší vzdálenosti. Ve srovnání s plynným vodíkem disponují vyšší energetickou hustotou, což je činí praktičtějšími pro přepravu i dlouhodobé uchování energie. Typickými příklady jsou čpavek (amoniak), methanol nebo e-paliva.", "kategorie": "Infrastruktura", "subkategorie": "Alternativní nosiče", "souvisejici": "Ammoniak; Kapalné organické nosiče vodíku; E-metan; Metanolové technologie skladování vodíku", "tagy": "Přeprava a distribuce; Skladování; Certifikace", "url": ""}, {"datum": "2025-03-10", "pojem": "Diferenciální tlak", "doslovny": "", "zkratka": "Δp", "popis": "Rozdíl tlaku naměřený mezi dvěma libovolnými body systému. Využívá se zejména při řízení průtoku, měření výkonu kompresorů nebo monitorování stavu filtrů a ventilů. V praxi je diferenciální tlak klíčovým parametrem pro regulaci a diagnostiku tlakových systémů.", "kategorie": "Věda a výzkum", "subkategorie": "Fyzika", "souvisejici": "Tlaková ztráta; Tlakový spád; Kompresor", "tagy": "Komponenty a zařízení; Plnění a výdej", "url": ""}, {"datum": "2025-04-29", "pojem": "Distribuční soustava", "doslovny": "", "zkratka": "", "popis": "Vzájemně propojený soubor vedení a zařízení sloužící k zajištění distribuce (dopravy) elektřiny, zemního plynu či vodíku zákazníkům na vymezeném území.", "kategorie": "Infrastruktura", "subkategorie": "Přeprava a distribuce", "souvisejici": "Vodíková distribuční soustava; Míchání; Plynárenský balíček (2024/1788)", "tagy": "Skladování; Evropská legislativa a strategie", "url": ""}, {"datum": "2025-03-10", "pojem": "Dynamická viskozita", "doslovny": "", "zkratka": "", "popis": "Míra odporu vodíku vůči proudění při daných podmínkách.", "kategorie": "Věda a výzkum", "subkategorie": "Fyzika", "souvisejici": "Škrcení průtoku; Joule-Thomsonův jev; Hmotnostní průtok vodíku", "tagy": "Přeprava a distribuce; Komponenty a zařízení", "url": ""}, {"dat vá elektrodová sestava", "tagy": "Elektrolýza; Palivové články; Materiály", "url": ""}, {"datum": "2025-04-29", "pojem": "Elektrolýza", "doslovny": "Electrolysis", "zkratka": "", "popis": "Elektrochemický děj, při kterém průchod stejnosměrného proudu taveninou nebo roztokem elektrolytu způsobuje rozklad molekul vody na elektrodách – na katodě dochází k redukci za vzniku vodíku (H₂), na anodě k oxidaci za vzniku kyslíku (O₂). Elektrolýza se využívá k výrobě vodíku, kovů, ke galvanickému pokovování nebo v průmyslu k získávání látek jako chlór či hydroxid sodný.", "kategorie": "Věda a výzkum", "subkategorie": "Chemie", "souvisejici": "Elektrolyzér; Zelený vodík; Elektrolyt; Elektroda", "tagy": "Elektrolýza; Certifikace; Fyzika", "url": ""}, {"datum": "2025-04-29", "pojem": "Elektrolyzér", "doslovny": "Electrolyser", "zkratka": "", "popis": "Zařízení využívající elektrickou energii k odlučování, štěpení nebo transformaci látek prostřednictvím redoxní reakce. Ve vodním elektrolyzéru dochází k rozkladu molekul vody (H₂O) na vodík (H₂) a kyslík (O₂), což je klíčový proces pro výrobu zeleného vodíku z obnovitelných zdrojů.", "kategorie": "Výroba", "subkategorie": "Elektrolýza", "souvisejici": "PEM elektrolyzér; AEM elektrolyzér; Elektrolyzér s pevným oxidovým elektrolytem; Membránová elektrodová sestava", "tagy": "Komponenty a zařízení; Certifikace; Náklady a financování", "url": ""}, {"datum": "2025-03-12", "pojem": "Elektrolyzér s pevným oxidovým elektrolytem", "doslovny": "Solid Oxide Electrolyzer Cell", "zkratka": "SOEC", "popis": "Vysokoteplotní elektrochemické zařízení, které využívá pevný oxidový elektrolyt k elektrolýze vody a/nebo oxidu uhličitého na vodík, oxid uhelnatý a kyslík. Tyto články pracují při zvýšených teplotách, obvykle mezi 500 a 850 °C. SOEC jsou považovány za slibnou technologii pro efektivní výrobu paliv a chemikálií s využitím obnovitelné elektřiny.", "kategorie": "Výroba", "subkategorie": "Elektrolýza", "souvisejici": "Elektrolyzér; Palivové články s pevnými oxidy; PEM elektrolyzér", "tagy": "Palivové články; Chemie; Termochemické procesy", "url": ""}, {"datum": "2025-03-10", "pojem": "Elektrostatický výboj", "doslovny": "Electrostatic discharge", "zkratka": "ESD", "popis": "Rychlý přenos statické elektřiny mezi dvěma objekty s různým elektrickým potenciálem = potenciální riziko, kdy elektrický výboj může způsobit zapálení směsi vodíku se vzduchem.", "kategorie": "Věda a výzkum", "subkategorie": "Fyzika", "souvisejici": "Inertizace; Pojistný ventil; Odtlakovací komín", "tagy": "Plnění a výdej; Normy a standardy", "url": ""}, {"datum": "2025-08-12", "pojem": "E-metan", "doslovny": "E-methane", "zkratka": "", "popis": "Syntetický plyn, který se vyrábí spojením vodíku a oxidu uhličitého (CO₂).", "kategorie": "Infrastruktura", "subkategorie": "Alternativní nosiče", "souvisejici": "Power-to-Methane; Power-to-Gas; Zachycování a využívání uhlíku; Míchání", "tagy": "Přeprava a distribuce; Termochemické procesy; Certifikace", "url": ""}, {"datum": "2025-08-12", "pojem": "EN ISO 17268", "doslovny": "Connecting devices for filling of gaseous hydrogen into land vehicles", "zkratka": "", "popis": "Evropská a mezinárodní norma, která specifikuje návrh, bezpečnost a provozní vlastnosti spojovacích zařízení (plnicích přípojek) pro doplňování plynného vodíku do pozemních vozidel", "kategorie": "Legislativa a certifikace", "subkategorie": "Normy a standardy", "souvisejici": "Výdejní stojan; Infračervené datové rozhraní; SAE J2601", "tagy": "Plnění a výdej; Komponenty a zařízení", "url": ""}, {"datum": "2025-03-10", "pojem": "Energetická hustota", "doslovny": "", "zkratka": "", "popis": "Množství energie uložené v jednotce objemu (Wh/l) nebo hmotnosti (Wh/kg) daného paliva či nosiče energie. Čím vyšší je energetická hustota, tím více energie lze uložit při menší hmotnosti nebo objemu. V kontextu vodíkových technologií je energetická hustota klíčovým parametrem při srovnávání různých forem skladování a přepravy vodíku – plynné, kapalné nebo vázané v derivátech jako čpavek či methanol.", "kategorie": "Věda a výzkum", "subkategorie": "Fyzika", "souvisejici": "Kapalný vodík; Stlačený plynný vodík; Vysokotlaký vodík; Hydridy kovů", "tagy": "Skladování; Alternativní nosiče; Mobilita", "url": ""}, {"datum": "2025-08-07", "pojem": "Entalpie hydrogenace", "doslovny": "", "zkratka": "ΔH", "popis": "Tepelná energie uvolněná nebo spotřebovaná při chemické reakci, při níž se vodík (H₂) váže na jinou molekulu. Jde o termodynamickou veličinu vyjádřenou v kJ/mol, která určuje, zda je daná reakce exotermická (energie se uvolňuje) nebo endotermická (energie se spotřebovává). V kontextu vodíkových technologií je klíčová například při skladování vodíku v LOHC nosičích, kde hydrogenace slouží k navázání vodíku na nosnou molekulu a dehydrogenace k jeho opětovnému uvolnění.", "kategorie": "Věda a výzkum", "subkategorie": "Fyzika", "souvisejici": "Hydridy kovů; Gibbsova volná energie absorpce vodíku; Poměr H/M", "tagy": "Materiály; Skladování; Chemie", "url": ""}, {"datum": "2025-04-29", "pojem": "E-paliva", "doslovny": "E-fuels", "zkratka": "", "popis": "Kapalná nebo plynná paliva vyráběná syntézou vodíku a oxidu uhličitého (CO₂) za využití elektrické energie z obnovitelných zdrojů. Mezi nejběžnější e-paliva patří e-metanol, e-methan nebo e-kerosín. Oproti fosilním palivům mají potenciálně neutrální uhlíkovou stopu – za předpokladu, že použitý vodík je zelený a CO₂ je zachyceno z atmosféry nebo průmyslových procesů. E-paliva jsou řazena mezi RFNBO a spadají pod regulaci směrnice RED.", "kategorie": "Infrastruktura", "subkategorie": "Alternativní nosiče", "souvisejici": "Kapalná a plynná paliva nebiologického původu; ReFuelEU Aviation (2023/2405); FuelEU Maritime; Deriváty vodíku", "tagy": "Certifikace; Mobilita; Evropská legislativa a strategie", "url": ""}, {"datum": "2025-04-29", "pojem": "EU ETS 2 (2023/959)", "doslovny": "Odkaz", "zkratka": "", "popis": "Směrnice o vytvoření systému pro obchodování s povolenkami na emise skleníkových plynů v Unii a rozhodnutí (EU) 2015/1814 o vytvoření a uplatňování rezervy tržní stability pro systém Unie pro obchodování s povolenkami na emise skleníkových plynů.", "kategorie": "Legislativa a certifikace", "subkategorie": "Evropská legislativa a strategie", "souvisejici": "CBAM (2023/956); Delegovaný Akt k EU ETS (2024/873); Uhlíkové clo", "tagy": "Energetický trh; Certifikace; Náklady a financování", "url": ""}, {"datum": "2025-04-29", "pojem": "EU Taxonomy (2020/852)", "doslovny": "Odkaz", "zkratka": "", "popis": "Nařízení zřizující rámce pro usnadnění udržitelných investic.", "kategorie": "Legislativa a certifikace", "subkategorie": "Evropská legislativa a strategie", "souvisejici": "Zelený vodík; Nízkouhlíkový vodík; Fit for 55", "tagy": "Náklady a financování; Certifikace; Podpora a pobídky", "url": ""}, {"datum": "2025-04-29", "pojem": "Evropská síť provozovatelů vodíkových sítí", "doslovny": "European Network of Network Operators of Hydrogen", "zkratka": "ENNO-H", "popis": "Evropská nezisková organizace, která je založena za účelem koordinace činností provozovatelů vodíkových přenosových sítí (HTNO) v celé EU", "kategorie": "Instituce a organizace", "subkategorie": "", "souvisejici": "Provozovatelé vodíkových přenosových sítí; Evropská vodíková páteřní síť; Plynárenský balíček (2024/1788)", "tagy": "Přeprava a distribuce; Evropská legislativa a strategie", "url": ""}, {"datum": "2025-04-29", "pojem": "Evropská vodíková páteřní síť", "doslovny": "European Hydrogen Backbone", "zkratka": "EHB", "popis": "Infrastruktura umožňující transevropskou přepravu vodíku.", "kategorie": "Infrastruktura", "subkategorie": "Přeprava a distribuce", "souvisejici": "Vodíková přepravní síť; Transevropská dopravní síť; Evropská síť provozovatelů vodíkových sítí", "tagy": "Evropská legislativa a strategie; Skladování", "url": ""}, {"datum": "2025-04-29", "pojem": "Evropská vodíková banka", "doslovny": "European Hydrogen Bank", "zkratka": "EHB", "po // Tab switching
function findTermData(label) {
  let d = DATA.find(i => i.pojem === label);
  if (!d) d = DATA.find(i => i.pojem && i.pojem.startsWith(label));
  if (!d) d = DATA.find(i => i.pojem && label.startsWith(i.pojem));
  return d;
}

function treeContainsTerm(node, pojem) {
  const td = findTermData(node.pojem || node.label);
  if (td && td.pojem === pojem) return true;
  if (node.children) return node.children.some(c => treeContainsTerm(c, pojem));
  return false;
}

function findTermInGroups(pojem) {
  return GROUPS.filter(g => treeContainsTerm(g.tree, pojem));
}

function buildTreeHTML(node, color, isRoot = false, highlightPojem = null) {
  const label = node.label;
  const termData = findTermData(node.pojem || label);
  const exists = !!termData;
  const isHighlighted = highlightPojem && termData && termData.pojem === highlightPojem;
  const abbr = node.abbr || (termData && termData.zkratka) || '';
  const classes = ['tree-node', isRoot ? 'root' : '', !exists ? 'missing' : '', isHighlighted ? 'highlighted' : ''].filter(Boolean).join(' ');
  const style = isRoot
    ? `background:${color.bg};color:${color.text};border-color:${color.border};`
    : isHighlighted ? `background:${color.bg};border-color:${color.border};color:${color.text};` : '';
  const onclick = exists && !isHighlighted
    ? `onclick="event.stopPropagation();navigateTo('${(termData.pojem).replace(/'/g, "\\'")}')"`
    : '';
  const title = !exists ? ' title="Pojem zatím není ve slovníku"' : '';

  const nodeHTML = `<span class="${classes}" style="${style}" ${onclick}${title}>
    <span class="tree-node-label">${label}</span>
    ${abbr ? `<span class="tree-node-abbr">${abbr}</span>` : ''}
    ${node.desc ? `<span style="font-size:0.65rem;opacity:0.6;margin-left:2px">${node.desc}</span>` : ''}
  </span>`;

  if (node.children && node.children.length > 0) {
    return `<li>${nodeHTML}<ul>${node.children.map(c => buildTreeHTML(c, color, false, highlightPojem)).join('')}</ul></li>`;
  }
  return `<li>${nodeHTML}</li>`;
}

function buildCardContextHTML(pojem) {
  const groups = findTermInGroups(pojem);
  if (groups.length > 0) {
    return groups.map(g => `
      <div class="kontext-group-title">${g.icon} ${g.name}</div>
      <div class="tree-wrap"><ul class="tree">${buildTreeHTML(g.tree, g.color, true, pojem)}</ul></div>
    `).join('<div style="margin-top:1rem"></div>');
  }
  // Fallback: linear kontext
  return buildKontextHTML(pojem) || '<div style="color:var(--muted);font-size:0.82rem">Kontext pro tento pojem není k dispozici.</div>';
}

function switchCardTab(btn, tabName) {
  event.stopPropagation();
  const body = btn.closest('.card-body');
  body.querySelectorAll('.card-tab').forEach(t => t.classList.toggle('active', t === btn));
  body.querySelectorAll('.card-tab-content').forEach(c => c.classList.toggle('hidden', c.dataset.tab !== tabName));
}

function getHierarchyPath(pojem) {
  // Exact match
  if (HIERARCHY[pojem]) return HIERARCHY[pojem];
  // Partial match by alias
  for (const [alias, target] of Object.entries(ALIAS)) {
    if (pojem.toLowerCase().includes(alias.toLowerCase()) || alias.toLowerCase().includes(pojem.toLowerCase())) {
      // Find the actual path array by checking if target string matches any key
      if (HIERARCHY[alias]) return HIERARCHY[alias];
      // Try to reconstruct path from the arrow-separated string
      const parts = target.split(' → ');
      if (parts.length > 0) {
        // check last element
        const lastKey = parts[parts.length - 1];
        if (HIERARCHY[lastKey]) return HIERARCHY[lastKey];
        // else build path manually
        return parts;
      }
    }
  }
  return null;
}

// ── STATE & RENDER ──────────────────────────────────────────────
let state = { query: '', cat: '', subcat: '', alpha: '', sort: 'az', expandedCats: new Set() };

function hl(text, q) {
  if (!q || !text) return text || '';
  return text.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`);
}

function filterData() {
  let d = DATA.filter(i => i.pojem && i.pojem.trim());
  if (state.subcat) {
    // Pojmy s danou subkategorií (v jejich vlastní kategorii) NEBO pojmy s tagem odpovídajícím subkategorii (kdekoliv)
    const allWithTag = DATA.filter(i =>
      i.subkategorie === state.subcat ||
      (i.tagy && i.tagy.split(';').map(t => t.trim()).includes(state.subcat))
    );
    d = d.filter(i => allWithTag.some(a => a.pojem === i.pojem));
    if (state.cat) d = d.filter(i =>
      i.kategorie === state.cat ||
      (i.tagy && i.tagy.split(';').map(t => t.trim()).includes(state.subcat))
    );
  } else if (state.cat) {
    d = d.filter(i => i.kategorie === state.cat);
  }
  if (state.alpha) d = d.filter(i => i.pojem[0].toUpperCase() === state.alpha);
  if (state.query) {
    const q = state.query.toLowerCase();
    d = d.filter(i =>
      (i.pojem && i.pojem.toLowerCase().includes(q)) ||
      (i.zkratka && i.zkratka.toLowerCase().includes(q)) ||
      (i.popis && i.popis.toLowerCase().includes(q)) ||
      (i.doslovny && i.doslovny.toLowerCase().includes(q)) ||
      (i.tagy && i.tagy.toLowerCase().includes(q)) ||
      (i.subkategorie && i.subkategorie.toLowerCase().includes(q))
    );
  }
  if (state.sort === 'az') d.sort((a,b) => a.pojem.localeCompare(b.pojem,'cs'));
  else if (state.sort === 'za') d.sort((a,b) => b.pojem.localeCompare(a.pojem,'cs'));
  else d.sort((a,b) => (b.datum||'').localeCompare(a.datum||''));
  return d;
}

  // Category button clicks
  document.querySelectorAll('.cat-btn:not(.all-btn)').forEach(btn => {
    btn.addEventListener('click', (e) => {
      if (e.target.closest('.cat-expand-icon')) return;
      const cat = btn.dataset.cat;
      if (state.cat === cat) {
        state.cat = '';
        state.subcat = '';
        state.expandedCats.delete(cat);
      } else {
        state.cat = cat;
        state.subcat = '';
        state.expandedCats.add(cat);
      }
      state.alpha = '';
      renderAll();
    });
  });

  // Expand icon clicks — toggle without re-render
  document.querySelectorAll('.cat-expand-icon').forEach(icon => {
    icon.addEventListener('click', (e) => {
      e.stopPropagation();
      const cat = icon.dataset.expand;
      if (state.expandedCats.has(cat)) {
        state.expandedCats.delete(cat);
      } else {
        state.expandedCats.add(cat);
      }
      icon.classList.toggle('open');
      document.querySelector(`.subcat-list[data-sublist="${cat}"]`)?.classList.toggle('open');
    });
  });

  // Subcategory button clicks
  document.querySelectorAll('.subcat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      const sub = btn.dataset.subcat;
      if (state.cat === cat && state.subcat === sub) {
        state.subcat = '';
      } else {
        state.cat = cat;
        state.subcat = sub;
      }
      state.alpha = '';
      renderAll();
    });
  });
}

function renderAlpha() {
  const filtered = filterData();
  const active = new Set(filtered.map(d => d.pojem[0].toUpperCase()));
  const all = [...new Set(DATA.filter(d=>d.pojem).map(d => d.pojem[0].toUpperCase()))].sort((a,b) => a.localeCompare(b,'cs'));
  document.getElementById('alphaNav').innerHTML = all.map(l =>
    `<button class="alpha-btn${state.alpha===l?' active':''}${!active.has(l)?' disabled':''}" data-l="${l}">${l}</button>`
  ).join('');
  document.querySelectorAll('.alpha-btn:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', () => { state.alpha = btn.dataset.l === state.alpha ? '' : btn.dataset.l; renderAll(); });
  });
}

function buildKontextHTML(pojem) {
  const path = getHierarchyPath(pojem);
  if (!path || path.length <= 1) return '';
  
  const nodes = path.map((node, i) => {
    const isCurrent = i === path.length - 1;
    if (isCurrent) {
      return `<span class="kontext-node current">${node}</span>`;
    }
    return `<span class="kontext-node" onclick="event.stopPropagation();navigateTo('${node.replace(/'/g, "\\'")}')">${node}</span>`;
  });
  
  const parts = [];
  nodes.forEach((n, i) => {
    parts.push(n);
    if (i < nodes.length - 1) parts.push('<span class="kontext-arrow">›</span>');
  });
  
  return `<div class="card-kontext">
    <div class="kontext-label">Kontext</div>
    <div class="kontext-tree">${parts.join('')}</div>
  </div>`;
}

function searchFor(term) {
  state.query = term;
  state.alpha = '';
  state.cat = '';
  document.getElementById('searchInput').value = term;
  document.getElementById('clearBtn').style.display = 'block';
  renderAll();
}

function filterByTag(tag) {
  state.query = tag;
  state.alpha = '';
  state.cat = '';
  document.getElementById('searchInput').value = tag;
  document.getElementById('clearBtn').style.display = 'block';
  renderAll();
}

function navigateTo(term) {
  // Clear filters and search so the target term is visible
  state.query = '';
  state.cat = '';
  state.subcat = '';
  state.alpha = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  renderAll();
  // After render, find the card and scroll to it with a highlight flash
  requestAnimationFrame(() => {
    const cards = document.querySelectorAll('.card');
    for (const card of cards) {
      const title = card.querySelector('.card-pojem');
      const titleText = title ? (title.childNodes[0]?.textContent?.trim() || title.textContent.trim()) : '';
      if (title && (titleText === term || title.textContent.trim() === term)) {
        if (!card.classList.contains('expanded')) card.classList.add('expanded');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.transition = 'box-shadow 0.3s, outline 0.3s';
        card.style.outline = '2px solid var(--blue)';
        card.style.boxShadow = '0 0 0 4px var(--blue-light)';
        setTimeout(() => {
          card.style.outline = '';
          card.style.boxShadow = '';
        }, 1800);
        break;
      }
    }
  });
}

function renderCards() {
  const filtered = filterData();
  const q = state.query;
  const total = DATA.filter(d=>d.pojem).length;
  document.getElementById('statCount').textContent = filtered.length;
  document.getElementById('resultsCount').innerHTML = filtered.length === total
    ? `Zobrazeno <strong>všech ${filtered.length}</strong> pojmů`
    : `Nalezeno <strong>${filtered.length}</strong> pojmů`;

  if (!filtered.length) {
    document.getElementById('cardsGrid').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>Nic nenalezeno</h3><p>Zkus jiný výraz nebo zruš filtry.</p></div>`;
    return;
  }

  // Při aktivní subkategorii rozděl na primární (vlastní subkat) a sekundární (přes tag)
  let primaryItems = filtered, secondaryItems = [];
  if (state.subcat) {
    primaryItems = filtered.filter(i => i.subkategorie === state.subcat);
    secondaryItems = filtered.filter(i => i.subkategorie !== state.subcat);
  }

  function renderCard(item) {
    const c = CAT_COLORS[item.kategorie] || DEFAULT_COLOR;
    const hasContext = findTermInGroups(item.pojem).length > 0 || !!buildKontextHTML(item.pojem);
    const contextHTML = hasContext ? buildCardContextHTML(item.pojem) : '';
    return `<div class="card" style="border-left-color:${c.border}; border-left-width:3px;">
      <div class="card-header">
        <div class="card-title-area">
          <div class="card-pojem">
            ${hl(item.pojem, q)}${item.zkratka ? ` <span class="card-zkratka">(${hl(item.zkratka, q)})</span>` : ''}
          </div>
          ${item.doslovny ? `<div class="card-doslovny">${hl(item.doslovny, q)}</div>` : ''}
          <div class="card-meta">
            <div class="card-meta-primary">
              ${item.kategorie ? `<span class="tag tag-cat" style="background:${c.bg};color:${c.text}">${item.kategorie}</span>` : ''}
              ${item.subkategorie ? `<span class="tag tag-sub">${item.subkategorie}</span>` : ''}
            </div>
            ${item.tagy ? `<div class="card-meta-tags">${item.tagy.split(';').map(t => t.trim()).filter(Boolean).map(t => `<span class="tag-extra" onclick="event.stopPropagation();filterByTag('${t}')">${t}</span>`).join('')}</div>` : ''}
          </div>
        </div>
        <svg class="card-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="card-body">
        ${(hasContext || item.souvisejici) ? `<div class="card-tabs">
          <button class="card-tab active" onclick="switchCardTab(this,'pojem')">Význam</button>
          ${hasContext ? `<button class="card-tab" onclick="switchCardTab(this,'kontext')">Kontext</button>` : ''}
          ${item.souvisejici ? `<button class="card-tab" onclick="switchCardTab(this,'souvisejici')">Související pojmy</button>` : ''}
        </div>` : ''}
        <div class="card-tab-content" data-tab="pojem">
          <div class="card-popis">${hl(item.popis || '<em style="color:#aaa">Popis zatím chybí.</em>', q)}</div>
          ${item.url ? `<a href="${item.url}" target="_blank" rel="noopener" class="card-link" onclick="event.stopPropagation()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Přejít na EUR-Lex
          </a>` : ''}
        </div>
        ${hasContext ? `<div class="card-tab-content hidden" data-tab="kontext">${contextHTML}</div>` : ''}
        ${item.souvisejici ? `<div class="card-tab-content hidden" data-tab="souvisejici"><div class="viz-take-links">${item.souvisejici.split(';').map(s=>s.trim()).filter(Boolean).map(s=>{const ex=DATA.some(d=>d.pojem===s);return ex?`<span class="viz-take-link" onclick="event.stopPropagation();navigateTo('${s.replace(/'/g,"\\'")}')">&#8599; ${s}</span>`:`<span class="viz-take-link" style="opacity:0.4;cursor:default">${s}</span>`;}).join('')}</div></div>` : ''}
      </div>
    </div>`;
  }

  const primaryHTML = primaryItems.map(renderCard).join('');
  const dividerHTML = (state.subcat && secondaryItems.length)
    ? `<div class="subcat-divider">Do této subkategorie lze zařadit také</div>`
    : '';
  const secondaryHTML = secondaryItems.map(renderCard).join('');
  document.getElementById('cardsGrid').innerHTML = primaryHTML + dividerHTML + secondaryHTML;

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => card.classList.toggle('expanded'));
  });
}

function renderAll() { renderCategories(); renderAlpha(); renderCards(); }

document.querySelector('.all-btn').addEventListener('click', () => {
  state.cat = '';
  state.subcat = '';
  state.alpha = '';
  renderAll();
});

document.getElementById('searchInput').addEventListener('input', e => {
  state.query = e.target.value;
  document.getElementById('clearBtn').style.display = state.query ? 'block' : 'none';
  state.alpha = '';
  renderAll();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  state.query = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  renderAll();
});
document.getElementById('sortSelect').addEventListener('change', e => { state.sort = e.target.value; renderCards(); });

renderAll();
</script>
</body>
</html>
